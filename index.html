<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>프리미엄 사주 리포트</title>
  <style>
    body {
      background: #0b0b0b;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    input, select, button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: gold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      white-space: pre-wrap;
      text-align: left;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<h1>프리미엄 사주 리포트</h1>

<input id="name" placeholder="이름"><br>

<select id="year">
  <script>
    for (let i = 1950; i <= 2025; i++) {
      document.write(`<option>${i}</option>`);
    }
  </script>
</select>

<select id="month">
  <script>
    for (let i = 1; i <= 12; i++) {
      document.write(`<option>${i}</option>`);
    }
  </script>
</select>

<select id="day">
  <script>
    for (let i = 1; i <= 31; i++) {
      document.write(`<option>${i}</option>`);
    }
  </script>
</select>

<br>

<select id="hour">
  <script>
    for (let i = 0; i < 24; i++) {
      document.write(`<option>${i}</option>`);
    }
  </script>
</select>

<select id="minute">
  <script>
    for (let i = 0; i < 60; i+=10) {
      document.write(`<option>${i}</option>`);
    }
  </script>
</select>

<br>

<select id="gender">
  <option>남자</option>
  <option>여자</option>
</select>

<br>

<button onclick="getSaju()">사주 리포트 보기</button>

<div id="result"></div>

<script>
async function getSaju() {
  const name = document.getElementById("name").value;
  const year = document.getElementById("year").value;
  const month = document.getElementById("month").value;
  const day = document.getElementById("day").value;
  const hour = document.getElementById("hour").value;
  const minute = document.getElementById("minute").value;
  const gender = document.getElementById("gender").value;

  try {
    const res = await fetch("/api/saju", {  // 🔥 여기 핵심 수정
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name, year, month, day, hour, minute, gender
      })
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.result;

  } catch (e) {
    document.getElementById("result").innerText = "연결 오류 발생";
  }
}
</script>

</body>
</html>
