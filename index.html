<!-- 기존 HTML / CSS 부분은 그대로 유지 -->

<script>
let isPaid=false;
let lastFullResult="";
let loadingTimer=null;

/* =========================
   🔥 결제 완료 URL 인식 (핵심)
========================= */
const params = new URLSearchParams(location.search);
if(params.get("paid") === "true"){
  isPaid = true;
}

/* =========================
   기존 코드 그대로
========================= */

function pad(n){return String(n).padStart(2,"0")}

/* (중간 함수들은 그대로 유지 - fillOptions, render 등 전부 유지) */


/* =========================
   🔥 결제 버튼 수정
========================= */
function unlock(){
  location.href = "/payment.html";
}


/* =========================
   분석 함수 (기존 유지)
========================= */
async function analyze(){

  const name=document.getElementById("name").value.trim();
  const calendarType=document.getElementById("calendarType").value;
  const year=document.getElementById("year").value;
  const month=document.getElementById("month").value;
  const day=document.getElementById("day").value;
  const hour=document.getElementById("hour").value;
  const minute=document.getElementById("minute").value;
  const gender=document.getElementById("gender").value;
  const result=document.getElementById("result");

  if(!name || !calendarType || !year || !month || !day || !hour || !minute || !gender){
    result.innerHTML='<div class="box">입력 정보를 모두 선택해주세요.</div>';
    return;
  }

  startBattleLoading();

  try{
    const res=await fetch("/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name,
        calendarType,
        birth:`${year}-${month}-${day}`,
        time:`${hour}:${minute}`,
        gender
      })
    });

    const data=await res.json();
    stopBattleLoading();

    if(!res.ok){
      result.innerHTML=`<div class="box">서버 오류: ${data.result || data.error || "응답 오류"}</div>`;
      return;
    }

    const report=cleanText(data.result);
    const preview=report.slice(0,950);

    const fullHTML=`
      <div class="box hero">
        <div>
          <h2>${name}님의 전쟁지도</h2>
          <p>당신의 원국은 고정된 판결문이 아니라 전략 지도입니다.</p>
        </div>
      </div>
      ${renderPillars(data.pillars)}
      ${renderItems(data.pillars)}
      ${renderDaewoon(data.daewoon)}
      ${renderSewoon(data.sewoon)}
      <div class="box" style="margin-top:18px">
        <h2 class="section-title">프리미엄 전투 해석</h2>
        <div class="report">${report}</div>
      </div>`;

    const previewHTML=`
      <div class="box hero">
        <div>
          <h2>${name}님의 무료 전쟁지도</h2>
          <p>무료 결과에서는 일부만 공개됩니다.</p>
        </div>
      </div>
      ${renderPillars(data.pillars)}
      ${renderItems(data.pillars)}
      ${renderDaewoon(data.daewoon)}
      ${renderSewoon(data.sewoon)}
      <div class="box" style="margin-top:18px">
        <h2 class="section-title">무료 미리보기</h2>
        <div class="report">${preview}...</div>
      </div>
      <div class="box lock" style="margin-top:18px">
        🔒 전체 리포트는 결제 후 확인 가능합니다.
      </div>`;

    lastFullResult = fullHTML;

    /* 🔥 핵심 분기 */
    result.innerHTML = isPaid ? fullHTML : previewHTML;

  }catch(e){
    stopBattleLoading();
    result.innerHTML=`<div class="box">연결 오류 발생: ${e.message}</div>`;
  }
}

/* =========================
   PDF 기능
========================= */
function downloadPDF(){
  if(!isPaid){
    alert("PDF 저장은 결제 후 가능합니다.");
    return;
  }
  window.print();
}
</script>
